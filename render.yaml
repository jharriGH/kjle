services:
  - type: web
    name: kjle-api
    runtime: python
    plan: starter
    pythonVersion: "3.11.15"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false